name: Feature request
description: Suggest an improvement for this profile repository
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is missing or inconvenient today?
      placeholder: Describe the current limitation
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What change would you like to see?
      placeholder: Describe the idea as clearly as possible
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, screenshots, or examples
